services:
  video-site-91:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}

    # Keep the deployment's local image and fork metadata; do not replace with upstream GHCR.
    image: hicocos-91:local
    container_name: video-site-91

    ports:
      - "127.0.0.1:9191:9191"

    volumes:
      - ./data:/opt/video-site-91/data

    environment:
      VIDEO_GITHUB_REPO: hicocos/91

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9191/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true

    mem_limit: 2g
    cpus: "2.0"
    pids_limit: 256

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    restart: unless-stopped
