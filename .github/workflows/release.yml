name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache-dependency-path: backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend lint
        run: npm run lint

      - name: Frontend tests
        run: npm test

      - name: Backend tests and vet
        working-directory: backend
        run: |
          go test ./... -count=1
          go vet ./...

      - name: Refuse to overwrite an existing release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists; refusing to overwrite it" >&2
            exit 1
          fi

      - name: Build release packages
        env:
          VERSION: ${{ github.ref_name }}
        run: scripts/build-release.sh

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          NOTES="$(git tag -l "$TAG" --format='%(contents)')"
          if [ -z "$NOTES" ]; then
            NOTES="Prebuilt Linux release packages."
          fi
          gh release create "$TAG" release/*.tar.gz release/SHA256SUMS \
            --title "$TAG" --notes "$NOTES" --verify-tag
